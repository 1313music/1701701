name = "1701701-announcement-admin"
main = "./worker.js"
compatibility_date = "2026-05-18"

# Optional: route same-origin admin API through the Worker instead of workers.dev.
# routes = [
#   { pattern = "1701701.xyz/api/admin/*", zone_name = "1701701.xyz" },
#   { pattern = "www.1701701.xyz/api/admin/*", zone_name = "1701701.xyz" }
# ]

[[kv_namespaces]]
binding = "ANNOUNCEMENT_KV"
id = "replace-with-production-kv-namespace-id"
preview_id = "replace-with-preview-kv-namespace-id"

[[r2_buckets]]
binding = "ANNOUNCEMENT_PUBLIC_BUCKET"
bucket_name = "1701701-announcements"
preview_bucket_name = "1701701-announcements"

[[r2_buckets]]
binding = "MUSIC_PUBLIC_BUCKET"
bucket_name = "minyaoclub"
preview_bucket_name = "minyaoclub"

[[r2_buckets]]
binding = "VIDEO_PUBLIC_BUCKET"
bucket_name = "minyaoclub"
preview_bucket_name = "minyaoclub"

[[r2_buckets]]
binding = "DOWNLOAD_PUBLIC_BUCKET"
bucket_name = "minyaoclub"
preview_bucket_name = "minyaoclub"

[vars]
ALLOWED_ORIGIN = "https://1701701.xyz,https://www.1701701.xyz,https://1701701.pages.dev,https://*.1701701.pages.dev,http://localhost:8080"
PUBLIC_OBJECT_KEY = "announcement.json"
PUBLIC_ANNOUNCEMENT_BASE_URL = "https://notice.1701701.xyz"

# Gallery publishing through GitHub.
# Set GITHUB_TOKEN or GALLERY_GITHUB_TOKEN with `wrangler secret put`.
GALLERY_GITHUB_OWNER = "replace-with-github-owner"
GALLERY_GITHUB_REPO = "replace-with-gallery-repo"
GALLERY_GITHUB_BRANCH = "main"
GALLERY_REPO_INDEX_PATH = "public/data/images.json"
GALLERY_REPO_IMAGE_ROOT = "public/images"
GALLERY_PUBLIC_IMAGE_ROOT = "images"
GALLERY_PUBLIC_BASE_URL = "https://imgs.1701701.xyz"
GITHUB_COMMITTER_NAME = "1701701 Admin"
GITHUB_COMMITTER_EMAIL = "admin@1701701.xyz"

# Music publishing through R2.
MUSIC_INDEX_KEY = "json/music-index.json"
MUSIC_AUDIO_ROOT = "mp3"
MUSIC_LRC_ROOT = "lrc"
MUSIC_COVER_ROOT = "img/music"
MUSIC_PUBLIC_BASE_URL = "https://r2.1701701.xyz"

# Video publishing through R2 JSON only.
VIDEO_INDEX_KEY = "json/video-index.json"
VIDEO_PUBLIC_BASE_URL = "https://r2.1701701.xyz"

# Download publishing through R2 JSON only.
DOWNLOAD_INDEX_KEY = "json/download-index.json"
DOWNLOAD_PUBLIC_BASE_URL = "https://r2.1701701.xyz"
