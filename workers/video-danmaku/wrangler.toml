name = "1701701-video-danmaku"
main = "./worker.js"
compatibility_date = "2026-06-11"
workers_dev = true

routes = [
  { pattern = "1701701.xyz/api/danmaku/*", zone_name = "1701701.xyz" },
  { pattern = "www.1701701.xyz/api/danmaku/*", zone_name = "1701701.xyz" }
]

[[d1_databases]]
binding = "DANMAKU_DB"
database_name = "1701701-video-danmaku"
database_id = "9d9e2925-dfb6-41aa-abdd-8882ecde2c14"

[vars]
ALLOWED_ORIGIN = "https://1701701.xyz,https://www.1701701.xyz,https://1701701.pages.dev,https://*.1701701.pages.dev,http://localhost:8080"
DANMAKU_MAX_TEXT_LENGTH = "40"
DANMAKU_MAX_PER_VIDEO = "1000"
DANMAKU_RATE_LIMIT_SECONDS = "10"
