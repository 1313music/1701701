name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-apk.yml'
      - 'scripts/android-shell.sh'
      - 'scripts/android-signing.sh'
      - 'apps/android-shell/**'
  workflow_dispatch:
    inputs:
      app_url:
        description: "Website URL to wrap"
        required: false
        default: "https://1701701.xyz"
      app_version:
        description: "Version name (informational)"
        required: false
        default: "1.0.0"
      release_tag:
        description: "Optional tag name to upload asset to GitHub Release"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Override app URL
        env:
          APP_URL: ${{ inputs.app_url }}
        run: |
          node -e '
          const fs = require("fs");
          const p = "apps/android-shell/capacitor.config.json";
          const c = JSON.parse(fs.readFileSync(p, "utf8"));
          c.server = c.server || {};
          c.server.url = process.env.APP_URL || "https://1701701.xyz";
          fs.writeFileSync(p, JSON.stringify(c, null, 2) + "\n");
          '

      - name: Init signing config
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_DNAME: ${{ secrets.ANDROID_KEY_DNAME }}
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
        run: |
          npm run android:init
          npm run android:signing:init

      - name: Build release APK
        run: |
          npm run android:apk:release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: apps/android-shell/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Prepare release asset
        if: ${{ inputs.release_tag != '' }}
        run: |
          mkdir -p release-assets
          cp apps/android-shell/android/app/build/outputs/apk/release/app-release.apk release-assets/1701701-android-release.apk

      - name: Upload to GitHub Release
        if: ${{ inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release-assets/1701701-android-release.apk
          generate_release_notes: true
