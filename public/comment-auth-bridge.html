<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>评论账号登录中转</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
        color: #0f172a;
        font: 500 16px/1.6 -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(92vw, 440px);
        padding: 28px 24px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.3;
      }

      p {
        margin: 0;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">正在返回评论区</h1>
      <p id="message">登录或注册完成后，这个页面会把认证结果回传给原页面。</p>
    </main>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const payload = { type: 'waline-auth-bridge', token: token || '' };
        const title = document.getElementById('title');
        const message = document.getElementById('message');

        if (!token) {
          title.textContent = '未获取到认证结果';
          message.textContent = '请关闭这个页面，回到评论区重新尝试登录或注册。';
          return;
        }

        const targetOrigin = window.location.origin;

        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, targetOrigin);
        }

        if (window.opener) {
          window.opener.postMessage(payload, targetOrigin);
        }

        window.setTimeout(() => {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(payload, targetOrigin);
          }

          if (window.opener) {
            window.opener.postMessage(payload, targetOrigin);
          }
        }, 180);
      })();
    </script>
  </body>
</html>
